blueprint:
  name: Worx Vision Cloud PLUS - inteligentny harmonogram koszenia
  description: >
    Dynamiczny harmonogram dla kosiarki Worx Vision Cloud PLUS. Szablon liczy
    dzienny przyrost trawy z temperatury, opadu, wilgotnosci gleby i
    naslonecznienia, zapisuje skumulowany przyrost w helperze input_number, a
    potem dobiera czas koszenia na podstawie metrazu trawnika i wydajnosci
    kosiarki. Przed uzyciem wylacz harmonogram koszenia w aplikacji WORX, zeby
    aplikacja i Home Assistant nie uruchamialy kosiarki niezaleznie od siebie.
  domain: automation
  author: Smart Service
  homeassistant:
    min_version: 2025.1.0
  source_url: https://github.com/SmartServicePL/worx_vision_cloud_plus_github/blob/main/blueprints/automation/worx_vision_cloud_plus/smart_mowing_schedule.yaml
  input:
    mower_entity:
      name: Kosiarka
      description: Encja lawn_mower z integracji Worx Vision Cloud PLUS.
      selector:
        entity:
          filter:
            - domain: lawn_mower
    battery_sensor:
      name: Bateria kosiarki
      description: Sensor procentu baterii kosiarki.
      selector:
        entity:
          filter:
            - domain: sensor
    rain_binary_sensor:
      name: Czujnik deszczu kosiarki
      description: Binary sensor aktywnego czujnika deszczu, uzywany do blokady startu i powrotu do bazy w trakcie deszczu.
      selector:
        entity:
          filter:
            - domain: binary_sensor
    temperature_source_entity:
      name: Temperatura ogrodu albo encja pogody
      description: Wybierz zwykly czujnik temperatury zewnetrznej, sensor statystyczny sredniej 24 h albo encje weather z atrybutem temperature.
      selector:
        entity:
          filter:
            - domain: sensor
            - domain: weather
    rain_source_entity:
      name: Opad albo encja pogody
      description: Wybierz sensor opadu w mm, sensor sumy 24 h albo encje weather. Dla weather szablon uzyje atrybutu precipitation, a gdy go nie ma, warunku pogody jako przyblizenia.
      selector:
        entity:
          filter:
            - domain: sensor
            - domain: weather
    soil_moisture_sensor:
      name: Wilgotnosc gleby opcjonalnie
      description: Opcjonalny sensor wilgotnosci gleby w procentach. Jesli zostawisz puste, szablon policzy wirtualna wilgotnosc z opadu, temperatury, naslonecznienia i pory roku.
      default: ""
      selector:
        entity:
          filter:
            - domain: sensor
    sunlight_source_entity:
      name: Naslonecznienie, UV albo encja pogody
      description: Wybierz sensor UV/naslonecznienia w skali 0-10 albo encje weather z atrybutem uv_index.
      selector:
        entity:
          filter:
            - domain: sensor
            - domain: weather
    growth_helper:
      name: Helper skumulowanego przyrostu
      description: input_number przechowujacy szacowany przyrost trawy w mm od ostatniego pelnego koszenia.
      selector:
        entity:
          filter:
            - domain: input_number
    last_mow_helper:
      name: Helper ostatniego koszenia
      description: input_datetime aktualizowany po pelnym cyklu koszenia.
      selector:
        entity:
          filter:
            - domain: input_datetime
    next_mow_helper:
      name: Helper nastepnego planowanego koszenia
      description: Opcjonalny input_datetime. Jesli wybierzesz helper, automatyzacja bedzie po obliczeniach wpisywac przewidywany termin nastepnego koszenia.
      default: ""
      selector:
        entity:
          filter:
            - domain: input_datetime
    mower_model:
      name: Model kosiarki WORX
      description: Wybierz model WORX Vision / Vision Cloud. Szablon dobierze robocza wydajnosc koszenia na podstawie maksymalnej powierzchni i szerokosci koszenia modelu. Dla innego modelu wybierz tryb reczny.
      default: custom
      selector:
        select:
          mode: dropdown
          options:
            - label: Recznie / inny model
              value: custom
            - label: Vision AI S250 WR202E - 250 m2
              value: wr202e_250
            - label: Vision AI M600 WR206E - 600 m2
              value: wr206e_600
            - label: Vision AI M800 WR208E - 800 m2
              value: wr208e_800
            - label: Vision AI L1300 WR213E - 1300 m2
              value: wr213e_1300
            - label: Vision AI L1600 WR216E - 1600 m2
              value: wr216e_1600
            - label: Vision AI WR220 - 1/2 acre
              value: wr220_2023
            - label: Vision Cloud 300 WR303E - 300 m2
              value: wr303e_300
            - label: Vision Cloud 500 WR305E - 500 m2
              value: wr305e_500
            - label: Vision Cloud 650 WR365E - 650 m2
              value: wr365e_650
            - label: Vision Cloud 650 WR365E.1 Cut-to-Zero - 650 m2
              value: wr365e1_650
            - label: Vision Cloud 800 WR308E - 800 m2
              value: wr308e_800
            - label: Vision Cloud 1200 WR312E - 1200 m2
              value: wr312e_1200
            - label: Vision Cloud 1800 WR318E - 1800 m2
              value: wr318e_1800
            - label: Vision Cloud 3000 WR330E - 3000 m2
              value: wr330e_3000
            - label: Vision Cloud 1/4 acre WR310/WR310.1
              value: wr310_1012
            - label: Vision Cloud 1/2 acre WR320/WR320.1
              value: wr320_2023
            - label: Vision Cloud 1 acre WR340
              value: wr340_us_4047
            - label: Vision Cloud 4WD 600 WR340E - 600 m2
              value: wr340e_600
            - label: Vision Cloud 4WD 1000 WR341E - 1000 m2
              value: wr341e_1000
            - label: Vision Cloud 4WD 2000 WR342E - 2000 m2
              value: wr342e_2000
            - label: Vision Cloud 4WD 4000 WR344E - 4000 m2
              value: wr344e_4000
            - label: Vision Cloud 4WD 1/4 acre WR341/WR341.1
              value: wr341_us_1012
            - label: Vision Cloud 4WD 1 acre WR344
              value: wr344_us_4047
    lawn_area_m2:
      name: Powierzchnia trawnika
      description: Powierzchnia robocza trawnika w metrach kwadratowych.
      default: 500
      selector:
        number:
          min: 20
          max: 5000
          step: 10
          unit_of_measurement: m2
          mode: box
    mower_capacity_m2_per_hour:
      name: Reczna wydajnosc kosiarki
      description: Uzywane tylko dla modelu "Recznie / inny model". Ile m2 kosiarka zwykle obsluguje w godzine w Twoim ogrodzie.
      default: 80
      selector:
        number:
          min: 20
          max: 250
          step: 5
          unit_of_measurement: m2/h
          mode: slider
    model_capacity_adjustment_percent:
      name: Korekta wydajnosci modelu
      description: Korekta dla Twojego ogrodu. Zmniejsz przy waskich przejazdach, wielu strefach lub przeszkodach; zwieksz przy prostym, otwartym trawniku.
      default: 100
      selector:
        number:
          min: 50
          max: 150
          step: 5
          unit_of_measurement: "%"
          mode: slider
    growth_threshold_mm:
      name: Prog startu koszenia
      description: Szacowany przyrost trawy w mm od ostatniego koszenia, po ktorym kosiarka moze wystartowac.
      default: 8
      selector:
        number:
          min: 2
          max: 25
          step: 0.5
          unit_of_measurement: mm
          mode: slider
    high_growth_threshold_mm:
      name: Prog intensywnego koszenia
      description: Po przekroczeniu tej wartosci harmonogram wydluza pojedynczy cykl.
      default: 14
      selector:
        number:
          min: 5
          max: 40
          step: 0.5
          unit_of_measurement: mm
          mode: slider
    min_days_between_mows:
      name: Minimalna przerwa miedzy koszeniami
      description: Zabezpieczenie przed zbyt czestym uruchamianiem.
      default: 1
      selector:
        number:
          min: 0
          max: 7
          step: 0.5
          unit_of_measurement: d
          mode: slider
    min_battery_percent:
      name: Minimalna bateria do startu
      default: 45
      selector:
        number:
          min: 10
          max: 100
          step: 5
          unit_of_measurement: "%"
          mode: slider
    max_rain_24h_mm:
      name: Maksymalny opad 24 h dla startu
      description: Jesli spadlo wiecej deszczu, koszenie zostanie odlozone.
      default: 3
      selector:
        number:
          min: 0
          max: 30
          step: 0.5
          unit_of_measurement: mm
          mode: slider
    max_soil_moisture_percent:
      name: Maksymalna wilgotnosc gleby dla startu
      description: Powyzej tej wartosci trawnik jest traktowany jako zbyt mokry.
      default: 72
      selector:
        number:
          min: 20
          max: 100
          step: 1
          unit_of_measurement: "%"
          mode: slider
    min_runtime_minutes:
      name: Minimalny czas koszenia
      default: 45
      selector:
        number:
          min: 10
          max: 180
          step: 5
          unit_of_measurement: min
          mode: slider
    max_runtime_minutes:
      name: Maksymalny czas koszenia
      default: 240
      selector:
        number:
          min: 30
          max: 480
          step: 15
          unit_of_measurement: min
          mode: slider
    growth_update_time:
      name: Godzina przeliczenia przyrostu
      default: "05:30:00"
      selector:
        time:
    primary_start_time:
      name: Glowna godzina startu
      default: "10:00:00"
      selector:
        time:
    backup_start_time:
      name: Druga proba startu
      description: Przydatna, gdy rano trawnik byl jeszcze mokry.
      default: "16:30:00"
      selector:
        time:

mode: single
max_exceeded: silent

triggers:
  - trigger: time
    id: update_growth
    at: !input growth_update_time
  - trigger: time
    id: start_primary
    at: !input primary_start_time
  - trigger: time
    id: start_backup
    at: !input backup_start_time

variables:
  mower_entity: !input mower_entity
  battery_sensor: !input battery_sensor
  rain_binary_sensor: !input rain_binary_sensor
  temperature_source_entity: !input temperature_source_entity
  rain_source_entity: !input rain_source_entity
  soil_moisture_sensor: !input soil_moisture_sensor
  sunlight_source_entity: !input sunlight_source_entity
  growth_helper: !input growth_helper
  last_mow_helper: !input last_mow_helper
  next_mow_helper: !input next_mow_helper
  mower_model: !input mower_model
  lawn_area_m2: !input lawn_area_m2
  manual_mower_capacity_m2_per_hour: !input mower_capacity_m2_per_hour
  model_capacity_adjustment_percent: !input model_capacity_adjustment_percent
  growth_threshold_mm: !input growth_threshold_mm
  high_growth_threshold_mm: !input high_growth_threshold_mm
  min_days_between_mows: !input min_days_between_mows
  min_battery_percent: !input min_battery_percent
  max_rain_24h_mm: !input max_rain_24h_mm
  max_soil_moisture_percent: !input max_soil_moisture_percent
  min_runtime_minutes: !input min_runtime_minutes
  max_runtime_minutes: !input max_runtime_minutes
  primary_start_time_value: !input primary_start_time
  backup_start_time_value: !input backup_start_time
  model_capacity_m2_per_hour: >-
    {% set model = mower_model %}
    {% if model in ['wr202e_250'] %}60
    {% elif model in ['wr303e_300'] %}65
    {% elif model in ['wr305e_500', 'wr206e_600'] %}70
    {% elif model in ['wr365e_650', 'wr365e1_650'] %}75
    {% elif model in ['wr208e_800', 'wr308e_800'] %}85
    {% elif model in ['wr213e_1300', 'wr312e_1200', 'wr310_1012'] %}95
    {% elif model in ['wr216e_1600', 'wr318e_1800', 'wr341e_1000'] %}100
    {% elif model in ['wr220_2023', 'wr320_2023', 'wr340e_600', 'wr341_us_1012', 'wr342e_2000'] %}105
    {% elif model in ['wr330e_3000', 'wr340_us_4047'] %}110
    {% elif model in ['wr344e_4000'] %}115
    {% elif model in ['wr344_us_4047'] %}120
    {% else %}{{ manual_mower_capacity_m2_per_hour | float(80) }}
    {% endif %}
  mower_capacity_m2_per_hour: >-
    {% set base = model_capacity_m2_per_hour | float(80) %}
    {% set adjustment = model_capacity_adjustment_percent | float(100) %}
    {{ (base * adjustment / 100) | round(0) }}
  temp_c: >-
    {% if temperature_source_entity.split('.')[0] == 'weather' %}
      {{ state_attr(temperature_source_entity, 'temperature') | float(10) }}
    {% else %}
      {{ states(temperature_source_entity) | float(10) }}
    {% endif %}
  rain_mm: >-
    {% if rain_source_entity.split('.')[0] == 'weather' %}
      {% set attr_rain = state_attr(rain_source_entity, 'precipitation') %}
      {% if attr_rain is not none %}
        {{ attr_rain | float(0) }}
      {% elif states(rain_source_entity) == 'pouring' %}
        8
      {% elif states(rain_source_entity) in ['rainy', 'lightning-rainy', 'snowy-rainy'] %}
        4
      {% elif states(rain_source_entity) == 'snowy' %}
        1
      {% else %}
        0
      {% endif %}
    {% else %}
      {{ states(rain_source_entity) | float(0) }}
    {% endif %}
  sunlight_index: >-
    {% if sunlight_source_entity.split('.')[0] == 'weather' %}
      {{ state_attr(sunlight_source_entity, 'uv_index') | float(5) }}
    {% else %}
      {{ states(sunlight_source_entity) | float(5) }}
    {% endif %}
  virtual_soil_moisture: >-
    {% set rain = rain_mm | float(0) %}
    {% set temp = temp_c | float(10) %}
    {% set sun = sunlight_index | float(5) %}
    {% set m = now().month %}
    {% if m in [12, 1, 2] %}
      {% set base = 72 %}
    {% elif m in [3, 4, 10, 11] %}
      {% set base = 58 %}
    {% else %}
      {% set base = 45 %}
    {% endif %}
    {% set rain_boost = rain * 7 %}
    {% if temp < 5 %}
      {% set temp_drying = -8 %}
    {% elif temp < 12 %}
      {% set temp_drying = -3 %}
    {% elif temp < 20 %}
      {% set temp_drying = 4 %}
    {% elif temp < 26 %}
      {% set temp_drying = 10 %}
    {% elif temp < 32 %}
      {% set temp_drying = 18 %}
    {% else %}
      {% set temp_drying = 25 %}
    {% endif %}
    {% set sun_drying = sun * 1.8 %}
    {% set raw = base + rain_boost - temp_drying - sun_drying %}
    {% if raw < 15 %}15{% elif raw > 95 %}95{% else %}{{ raw | round(0) }}{% endif %}
  soil_moisture: >-
    {% set entity = soil_moisture_sensor | default('', true) %}
    {% if entity | length > 0 and states(entity) not in ['unknown', 'unavailable', 'none', ''] %}
      {{ states(entity) | float(virtual_soil_moisture | float) }}
    {% else %}
      {{ virtual_soil_moisture }}
    {% endif %}
  estimated_growth_mm: "{{ states(growth_helper) | float(0) }}"
  last_mow_days_ago: >-
    {% set raw = states(last_mow_helper) %}
    {% if raw in ['unknown', 'unavailable', 'none', ''] %}
      999
    {% else %}
      {% set days = (as_timestamp(now()) - as_timestamp(raw)) / 86400 %}
      {% if days < 0 %}0{% else %}{{ days | round(1) }}{% endif %}
    {% endif %}
  temp_factor: >-
    {% set t = temp_c | float %}
    {% if t < 5 %}0
    {% elif t < 10 %}0.35
    {% elif t < 16 %}0.75
    {% elif t < 24 %}1
    {% elif t < 30 %}0.8
    {% else %}0.35
    {% endif %}
  rain_factor: >-
    {% set r = rain_mm | float %}
    {% if r < 0.2 %}0.55
    {% elif r < 2 %}0.75
    {% elif r < 10 %}1
    {% elif r < 25 %}0.85
    {% else %}0.55
    {% endif %}
  soil_factor: >-
    {% set s = soil_moisture | float %}
    {% if s < 20 %}0.45
    {% elif s < 35 %}0.75
    {% elif s <= 65 %}1
    {% elif s <= 80 %}0.85
    {% else %}0.55
    {% endif %}
  sunlight_factor: >-
    {% set u = sunlight_index | float %}
    {% if u < 1 %}0.35
    {% elif u < 3 %}0.65
    {% elif u <= 8 %}1
    {% else %}0.85
    {% endif %}
  season_factor: >-
    {% set m = now().month %}
    {% if m in [12, 1, 2] %}0.05
    {% elif m in [3, 11] %}0.35
    {% elif m in [4, 10] %}0.65
    {% else %}1
    {% endif %}
  growth_today_mm: >-
    {% set raw = 4.5 * (temp_factor | float) * (rain_factor | float) * (soil_factor | float) * (sunlight_factor | float) * (season_factor | float) %}
    {% if raw < 0 %}0{% elif raw > 7 %}7{% else %}{{ raw | round(1) }}{% endif %}
  new_growth_mm: >-
    {% set raw = (estimated_growth_mm | float) + (growth_today_mm | float) %}
    {% if raw < 0 %}0{% elif raw > 40 %}40{% else %}{{ raw | round(1) }}{% endif %}
  coverage_factor: >-
    {% set threshold = growth_threshold_mm | float %}
    {% set pressure = (estimated_growth_mm | float) / (threshold if threshold > 0 else 0.1) %}
    {% set raw = 0.45 + (pressure * 0.35) %}
    {% if raw < 0.45 %}0.45{% elif raw > 1 %}1{% else %}{{ raw | round(2) }}{% endif %}
  growth_runtime_factor: >-
    {% set g = estimated_growth_mm | float %}
    {% if g >= (high_growth_threshold_mm | float) %}1.25
    {% elif g >= (growth_threshold_mm | float) %}1
    {% else %}0.75
    {% endif %}
  recommended_runtime_minutes: >-
    {% set capacity = mower_capacity_m2_per_hour | float %}
    {% set raw = ((lawn_area_m2 | float) / (capacity if capacity > 0 else 1)) * 60 * (coverage_factor | float) * (growth_runtime_factor | float) %}
    {% set rounded = raw | round(0) | int %}
    {% if rounded < (min_runtime_minutes | int) %}{{ min_runtime_minutes | int }}{% elif rounded > (max_runtime_minutes | int) %}{{ max_runtime_minutes | int }}{% else %}{{ rounded }}{% endif %}
  next_mow_datetime: >-
    {% set planned_growth = new_growth_mm | float if trigger.id == 'update_growth' else estimated_growth_mm | float %}
    {% set missing_growth = (growth_threshold_mm | float) - planned_growth %}
    {% set daily_growth = growth_today_mm | float %}
    {% if missing_growth <= 0 %}
      {% set days_growth = 0 %}
    {% elif daily_growth <= 0.1 %}
      {% set days_growth = 7 %}
    {% else %}
      {% set days_growth = (missing_growth / daily_growth) | round(0, 'ceil') | int %}
    {% endif %}
    {% set missing_gap = (min_days_between_mows | float) - (last_mow_days_ago | float) %}
    {% if missing_gap <= 0 %}
      {% set days_gap = 0 %}
    {% else %}
      {% set days_gap = missing_gap | round(0, 'ceil') | int %}
    {% endif %}
    {% set days_ready = days_growth if days_growth > days_gap else days_gap %}
    {% set primary = today_at(primary_start_time_value) %}
    {% set backup = today_at(backup_start_time_value) %}
    {% if days_ready <= 0 %}
      {% if as_timestamp(now()) < as_timestamp(primary) %}
        {{ as_timestamp(primary) | timestamp_custom('%Y-%m-%d %H:%M:%S', true) }}
      {% elif as_timestamp(now()) < as_timestamp(backup) %}
        {{ as_timestamp(backup) | timestamp_custom('%Y-%m-%d %H:%M:%S', true) }}
      {% else %}
        {{ (as_timestamp(primary) + 86400) | timestamp_custom('%Y-%m-%d %H:%M:%S', true) }}
      {% endif %}
    {% else %}
      {{ (as_timestamp(primary) + (days_ready * 86400)) | timestamp_custom('%Y-%m-%d %H:%M:%S', true) }}
    {% endif %}
  next_mow_after_reset_datetime: >-
    {% set daily_growth = growth_today_mm | float %}
    {% if daily_growth <= 0.1 %}
      {% set days_growth = 7 %}
    {% else %}
      {% set days_growth = ((growth_threshold_mm | float) / daily_growth) | round(0, 'ceil') | int %}
    {% endif %}
    {% set days_gap = min_days_between_mows | float | round(0, 'ceil') | int %}
    {% set days_ready = days_growth if days_growth > days_gap else days_gap %}
    {% if days_ready < 1 %}
      {% set days_ready = 1 %}
    {% endif %}
    {{ (as_timestamp(today_at(primary_start_time_value)) + (days_ready * 86400)) | timestamp_custom('%Y-%m-%d %H:%M:%S', true) }}

actions:
  - choose:
      - conditions:
          - condition: template
            value_template: "{{ trigger.id == 'update_growth' }}"
        sequence:
          - action: input_number.set_value
            target:
              entity_id: !input growth_helper
            data:
              value: "{{ new_growth_mm }}"
          - choose:
              - conditions:
                  - condition: template
                    value_template: "{{ (next_mow_helper | default('', true) | length) > 0 }}"
                sequence:
                  - action: input_datetime.set_datetime
                    target:
                      entity_id: "{{ next_mow_helper }}"
                    data:
                      datetime: "{{ next_mow_datetime }}"

      - conditions:
          - condition: template
            value_template: "{{ trigger.id in ['start_primary', 'start_backup'] }}"
        sequence:
          - condition: template
            alias: Kosiarka musi byc w bazie albo pauzie
            value_template: "{{ states(mower_entity) in ['docked', 'paused'] }}"
          - condition: template
            alias: Wystarczajaca bateria
            value_template: "{{ states(battery_sensor) | float(0) >= (min_battery_percent | float) }}"
          - condition: template
            alias: Czujnik deszczu nieaktywny
            value_template: "{{ is_state(rain_binary_sensor, 'off') }}"
          - condition: template
            alias: Trawnik nie jest po zbyt duzym opadzie
            value_template: "{{ (rain_mm | float) <= (max_rain_24h_mm | float) }}"
          - condition: template
            alias: Gleba nie jest zbyt mokra
            value_template: "{{ (soil_moisture | float) <= (max_soil_moisture_percent | float) }}"
          - condition: template
            alias: Trawa przekroczyla prog koszenia
            value_template: "{{ (estimated_growth_mm | float) >= (growth_threshold_mm | float) }}"
          - condition: template
            alias: Zachowana minimalna przerwa
            value_template: "{{ (last_mow_days_ago | float) >= (min_days_between_mows | float) }}"
          - action: lawn_mower.start_mowing
            target:
              entity_id: !input mower_entity
          - wait_for_trigger:
              - trigger: state
                entity_id: !input rain_binary_sensor
                to: "on"
            timeout:
              minutes: "{{ recommended_runtime_minutes }}"
            continue_on_timeout: true
          - choose:
              - conditions:
                  - condition: template
                    value_template: "{{ states(mower_entity) in ['mowing', 'paused'] }}"
                sequence:
                  - action: lawn_mower.dock
                    target:
                      entity_id: !input mower_entity
          - choose:
              - conditions:
                  - condition: template
                    value_template: "{{ wait.trigger is none }}"
                sequence:
                  - action: input_datetime.set_datetime
                    target:
                      entity_id: !input last_mow_helper
                    data:
                      datetime: "{{ now().strftime('%Y-%m-%d %H:%M:%S') }}"
                  - action: input_number.set_value
                    target:
                      entity_id: !input growth_helper
                    data:
                      value: 0
                  - choose:
                      - conditions:
                          - condition: template
                            value_template: "{{ (next_mow_helper | default('', true) | length) > 0 }}"
                        sequence:
                          - action: input_datetime.set_datetime
                            target:
                              entity_id: "{{ next_mow_helper }}"
                            data:
                              datetime: "{{ next_mow_after_reset_datetime }}"
            default:
              - action: input_number.set_value
                target:
                  entity_id: !input growth_helper
                data:
                  value: "{{ ((estimated_growth_mm | float) * 0.7) | round(1) }}"
