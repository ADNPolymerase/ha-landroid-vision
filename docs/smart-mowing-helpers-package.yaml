# Optional Home Assistant package with helpers for the smart mowing blueprint.
#
# Copy this into a package file, for example:
# /config/packages/worx_smart_mowing.yaml
#
# Then adjust names if you use more than one mower.

input_number:
  worx_estimated_grass_growth_mm:
    name: Worx - szacowany przyrost trawy
    min: 0
    max: 40
    step: 0.1
    unit_of_measurement: mm
    icon: mdi:grass

input_datetime:
  worx_last_full_mow:
    name: Worx - ostatnie pelne koszenie
    has_date: true
    has_time: true
    icon: mdi:calendar-check

  worx_next_planned_mow:
    name: Worx - nastepne planowane koszenie
    has_date: true
    has_time: true
    icon: mdi:calendar-clock
